<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none" font-family="system-ui, sans-serif">
  <rect width="640" height="400" rx="8" fill="#ffffff"/>
  <rect x="0" y="0" width="640" height="400" rx="8" stroke="#dee2e6" stroke-width="1" fill="none"/>

  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">RDMA Verbs 协议栈</text>

  <!-- User App -->
  <rect x="80" y="48" width="480" height="40" rx="6" fill="#e7f5ff" stroke="#1c7ed6" stroke-width="1"/>
  <text x="320" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#1864ab">用户应用程序</text>

  <!-- Arrow down -->
  <line x1="320" y1="88" x2="320" y2="106" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow-d)"/>

  <!-- Verbs Library -->
  <rect x="80" y="108" width="480" height="40" rx="6" fill="#d0ebff" stroke="#74c0fc" stroke-width="1"/>
  <text x="320" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#1864ab">libibverbs (Verbs Library)</text>

  <line x1="320" y1="148" x2="320" y2="166" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow-d)"/>

  <!-- Kernel -->
  <rect x="80" y="168" width="480" height="56" rx="6" fill="#f3f0ff" stroke="#9775fa" stroke-width="1"/>
  <text x="320" y="190" text-anchor="middle" font-size="13" font-weight="600" fill="#6741d9">ib_uverbs (内核模块)</text>
  <text x="320" y="208" text-anchor="middle" font-size="10" fill="#495057">字符设备 /dev/infiniband/uverbsN</text>

  <line x1="320" y1="224" x2="320" y2="242" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow-d)"/>

  <!-- RDMA Driver -->
  <rect x="80" y="244" width="480" height="40" rx="6" fill="#f3f0ff" stroke="#9775fa" stroke-width="1"/>
  <text x="320" y="268" text-anchor="middle" font-size="13" font-weight="600" fill="#6741d9">RDMA 硬件驱动 (mlx5 / qedr / ...)</text>

  <line x1="320" y1="284" x2="320" y2="302" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow-d)"/>

  <!-- RNIC -->
  <rect x="80" y="304" width="480" height="52" rx="6" fill="#ebfbee" stroke="#51cf66" stroke-width="1"/>
  <text x="320" y="326" text-anchor="middle" font-size="13" font-weight="600" fill="#2b8a3e">RNIC 硬件 (ConnectX / E810-RE)</text>
  <text x="320" y="344" text-anchor="middle" font-size="10" fill="#495057">QP | CQ | MR 表 | 传输引擎</text>

  <!-- Side annotations -->
  <line x1="40" y1="68" x2="72" y2="68" stroke="#868e96" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="36" y="72" text-anchor="end" font-size="9" fill="#868e96">用户空间</text>

  <line x1="40" y1="196" x2="72" y2="196" stroke="#868e96" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="36" y="200" text-anchor="end" font-size="9" fill="#868e96">内核空间</text>

  <line x1="40" y1="330" x2="72" y2="330" stroke="#868e96" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="36" y="334" text-anchor="end" font-size="9" fill="#868e96">硬件</text>

  <defs>
    <marker id="arrow-d" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#868e96"/>
    </marker>
  </defs>
</svg>
