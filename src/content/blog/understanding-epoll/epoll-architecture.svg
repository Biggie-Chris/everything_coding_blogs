<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" fill="none" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#868e96"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1c7ed6"/>
    </marker>
  </defs>

  <rect width="720" height="420" rx="8" fill="#ffffff"/>
  <rect x="0" y="0" width="720" height="420" rx="8" stroke="#dee2e6" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">epoll 内核架构</text>

  <!-- Application -->
  <rect x="40" y="56" width="160" height="48" rx="6" fill="#f1f3f5" stroke="#dee2e6" stroke-width="1"/>
  <text x="120" y="76" text-anchor="middle" font-size="12" fill="#495057">用户空间</text>
  <text x="120" y="94" text-anchor="middle" font-size="11" fill="#868e96">epoll_wait / epoll_ctl</text>

  <!-- eventpoll -->
  <rect x="280" y="56" width="160" height="160" rx="6" fill="#e7f5ff" stroke="#1c7ed6" stroke-width="1.5"/>
  <text x="360" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#1c7ed6">eventpoll</text>
  <line x1="300" y1="84" x2="420" y2="84" stroke="#1c7ed6" stroke-width="0.5"/>

  <!-- rbr -->
  <rect x="296" y="92" width="128" height="36" rx="4" fill="#d0ebff" stroke="#74c0fc" stroke-width="1"/>
  <text x="360" y="116" text-anchor="middle" font-size="11" fill="#1864ab">rbr (红黑树)</text>

  <!-- rdllist -->
  <rect x="296" y="136" width="128" height="36" rx="4" fill="#d0ebff" stroke="#74c0fc" stroke-width="1"/>
  <text x="360" y="160" text-anchor="middle" font-size="11" fill="#1864ab">rdllist (就绪链表)</text>

  <!-- wq -->
  <rect x="296" y="180" width="128" height="28" rx="4" fill="#d0ebff" stroke="#74c0fc" stroke-width="1"/>
  <text x="360" y="198" text-anchor="middle" font-size="11" fill="#1864ab">wq (等待队列)</text>

  <!-- epitem nodes -->
  <rect x="520" y="56" width="160" height="160" rx="6" fill="#f3f0ff" stroke="#9775fa" stroke-width="1"/>
  <text x="600" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#6741d9">epitem</text>
  <line x1="540" y1="84" x2="660" y2="84" stroke="#9775fa" stroke-width="0.5"/>

  <text x="600" y="105" font-size="10" fill="#495057">fd: socket fd</text>
  <text x="600" y="120" font-size="10" fill="#495057">events: EPOLLIN | EPOLLET</text>
  <text x="600" y="135" font-size="10" fill="#495057">*next: (链表指针)</text>
  <text x="600" y="150" font-size="10" fill="#495057">*rbn: (红黑树节点)</text>
  <text x="600" y="165" font-size="10" fill="#495057">*ffd: eventpoll 指针</text>
  <text x="600" y="180" font-size="10" fill="#495057">callback: ep_poll_callback</text>

  <!-- Socket buffers -->
  <rect x="520" y="248" width="160" height="52" rx="6" fill="#ebfbee" stroke="#51cf66" stroke-width="1"/>
  <text x="600" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#2b8a3e">socket buffer</text>
  <text x="600" y="286" text-anchor="middle" font-size="10" fill="#495057">sk_receive_queue</text>

  <!-- Kernel bottom -->
  <rect x="280" y="248" width="160" height="52" rx="6" fill="#fff3bf" stroke="#f08c00" stroke-width="1"/>
  <text x="360" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#e67700">网卡 / 协议栈</text>
  <text x="360" y="286" text-anchor="middle" font-size="10" fill="#495057">tcp_rcv → sk_data_ready</text>

  <!-- Arrows -->
  <line x1="200" y1="80" x2="280" y2="80" stroke="#868e96" stroke-width="1" marker-end="url(#arrow)"/>

  <line x1="360" y1="216" x2="360" y2="248" stroke="#868e96" stroke-width="1" stroke-dasharray="3,2"/>

  <line x1="440" y1="136" x2="520" y2="136" stroke="#1c7ed6" stroke-width="1" marker-end="url(#arrow-blue)"/>
  <text x="480" y="130" text-anchor="middle" font-size="9" fill="#1c7ed6">红黑树节点</text>

  <line x1="440" y1="160" x2="520" y2="160" stroke="#1c7ed6" stroke-width="1" marker-end="url(#arrow-blue)"/>
  <text x="480" y="156" text-anchor="middle" font-size="9" fill="#1c7ed6">就绪链表项</text>

  <line x1="440" y1="274" x2="520" y2="274" stroke="#868e96" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="480" y="268" text-anchor="middle" font-size="9" fill="#868e96">数据到达</text>

  <line x1="520" y1="200" x2="520" y2="248" stroke="#868e96" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="320" width="640" height="1" fill="#dee2e6"/>

  <rect x="40" y="340" width="12" height="12" rx="2" fill="#e7f5ff" stroke="#1c7ed6" stroke-width="1"/>
  <text x="60" y="352" font-size="10" fill="#495057">eventpoll</text>

  <rect x="160" y="340" width="12" height="12" rx="2" fill="#f3f0ff" stroke="#9775fa" stroke-width="1"/>
  <text x="180" y="352" font-size="10" fill="#495057">epitem (文件描述符代理)</text>

  <rect x="380" y="340" width="12" height="12" rx="2" fill="#ebfbee" stroke="#51cf66" stroke-width="1"/>
  <text x="400" y="352" font-size="10" fill="#495057">socket buffer</text>

  <rect x="520" y="340" width="12" height="12" rx="2" fill="#fff3bf" stroke="#f08c00" stroke-width="1"/>
  <text x="540" y="352" font-size="10" fill="#495057">协议栈层</text>

  <text x="40" y="390" font-size="9" fill="#adb5bd">epoll_wait 检查 rdllist → 非空则立即返回，空则将进程挂起到 wq → 数据到达时回调将 epitem 移入 rdllist → 唤醒进程</text>
</svg>
